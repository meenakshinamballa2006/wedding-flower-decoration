<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Flower Decoration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fff7f5;
}

header{
    background:#c2185b;
    color:white;
    text-align:center;
    padding:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:15px;
    color:#c2185b;
}

footer{
    background:#c2185b;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>
    <h1>🌸 Wedding Flower Decoration Gallery 🌸</h1>
    <p>Beautiful Floral Decoration Ideas</p>
</header>

<section class="gallery">

<div class="card">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=600" alt="Wedding Entrance">
<h3>Wedding Entrance</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a?w=600" alt="Table Decoration">
<h3>Table Flower Decoration</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=600" alt="Rose Decoration">
<h3>Rose Theme Decoration</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600" alt="Reception Decoration">
<h3>Reception Decoration</h3>
</div>

</section>

<footer>
    <p>&copy; 2026 Wedding Flower Decoration Mini Project</p>
</footer>

</body>
</html>
